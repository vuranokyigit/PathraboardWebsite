<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathraboard — Yakında App Store ve Google Play'de</title>
<meta name="description" content="Pathraboard yakında App Store ve Google Play'de! Haberdar olmak için e-posta listemize katılın.">
<meta name="theme-color" content="#0a0a0f">

<!-- Open Graph -->
<meta property="og:title" content="Pathraboard — Yakında">
<meta property="og:description" content="Yakında App Store ve Google Play'de">
<meta property="og:type" content="website">
<meta property="og:url" content="https://pathraboard.com">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --bg-2: #12121a;
    --fg: #f5f5f7;
    --muted: #8b8b96;
    --accent: #6366f1;
    --accent-2: #a855f7;
    --border: rgba(255,255,255,0.08);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Animated gradient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(99,102,241,0.25), transparent 60%),
      radial-gradient(ellipse 70% 50% at 80% 80%, rgba(168,85,247,0.2), transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(236,72,153,0.15), transparent 60%);
    z-index: -1;
    animation: breathe 12s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* Grid overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: -1;
    pointer-events: none;
  }

  .container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 2rem;
    backdrop-filter: blur(10px);
    animation: fadeInUp 0.8s ease;
  }

  .badge .dot {
    width: 8px;
    height: 8px;
    background: #10b981;
    border-radius: 50%;
    box-shadow: 0 0 12px #10b981;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(3rem, 10vw, 6rem);
    font-weight: 700;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, #fff 0%, #a855f7 50%, #6366f1 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 1rem;
    animation: fadeInUp 0.8s ease 0.1s backwards;
  }

  .tagline {
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    color: var(--fg);
    max-width: 600px;
    margin-bottom: 0.75rem;
    font-weight: 500;
    animation: fadeInUp 0.8s ease 0.2s backwards;
  }

  .subtitle {
    font-size: 1rem;
    color: var(--muted);
    max-width: 500px;
    line-height: 1.6;
    margin-bottom: 3rem;
    animation: fadeInUp 0.8s ease 0.3s backwards;
  }

  .stores {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 3rem;
    animation: fadeInUp 0.8s ease 0.4s backwards;
  }

  .store-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.9rem 1.5rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--fg);
    text-decoration: none;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    cursor: not-allowed;
    opacity: 0.85;
  }

  .store-btn:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }

  .store-btn svg {
    width: 28px;
    height: 28px;
  }

  .store-btn .small {
    font-size: 0.7rem;
    color: var(--muted);
    display: block;
    line-height: 1;
    margin-bottom: 2px;
  }

  .store-btn .big {
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1;
  }

  .email-form {
    display: flex;
    gap: 0.5rem;
    max-width: 440px;
    width: 100%;
    animation: fadeInUp 0.8s ease 0.5s backwards;
  }

  .email-form input {
    flex: 1;
    padding: 0.9rem 1.2rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--fg);
    font-family: inherit;
    font-size: 0.95rem;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
  }

  .email-form input:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(255,255,255,0.08);
  }

  .email-form input::placeholder { color: var(--muted); }

  .email-form button {
    padding: 0.9rem 1.5rem;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border: none;
    border-radius: 12px;
    color: white;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .email-form button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(99,102,241,0.4);
  }

  .form-msg {
    margin-top: 1rem;
    font-size: 0.85rem;
    color: #10b981;
    min-height: 1.2em;
    animation: fadeInUp 0.8s ease 0.5s backwards;
  }

  footer {
    position: fixed;
    bottom: 1.5rem;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.8rem;
    color: var(--muted);
    animation: fadeInUp 0.8s ease 0.6s backwards;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .email-form { flex-direction: column; }
    .stores { flex-direction: column; width: 100%; max-width: 300px; }
    .store-btn { justify-content: center; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="badge">
    <span class="dot"></span>
    <span>Çok yakında geliyor</span>
  </div>

  <h1 class="logo">Pathraboard</h1>

  <p class="tagline">Yakında App Store ve Google Play'de</p>
  <p class="subtitle">Üzerinde çalıştığımız yeni deneyim için son rötuşları yapıyoruz. Lansmandan ilk haberdar olmak ister misiniz?</p>

  <div class="stores">
    <a class="store-btn" href="#" onclick="return false;" aria-label="App Store — yakında">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.53 4.08zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
      <div style="text-align:left;">
        <span class="small">Yakında</span>
        <span class="big">App Store</span>
      </div>
    </a>

    <a class="store-btn" href="#" onclick="return false;" aria-label="Google Play — yakında">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.6 2.27c-.37.39-.6 1-.6 1.79v15.88c0 .79.23 1.4.6 1.79l.09.08L12.5 12.9v-.18L3.69 2.19l-.09.08zm10.23 10.92l3.02 3.03-10.1 5.74c-.35.2-.69.26-1 .18l8.08-8.95zm3.02-4.16l-3.02 3.02L5.75 3.1c.31-.08.65-.02 1 .18l10.1 5.75zm3.79 3.36c.68.39.68 1.02 0 1.41l-2.98 1.7-3.29-3.29L17.66 9.5l2.98 1.69z"/></svg>
      <div style="text-align:left;">
        <span class="small">Yakında</span>
        <span class="big">Google Play</span>
      </div>
    </a>
  </div>

  <form class="email-form" onsubmit="handleSubmit(event)">
    <input type="email" placeholder="E-posta adresiniz" required>
    <button type="submit">Haber Ver</button>
  </form>
  <div class="form-msg" id="formMsg"></div>

</div>

<footer>
  © 2026 Pathraboard. Tüm hakları saklıdır.
</footer>

<script>
  function handleSubmit(e) {
    e.preventDefault();
    const input = e.target.querySelector('input');
    const msg = document.getElementById('formMsg');
    msg.textContent = '✓ Teşekkürler! Lansman sırasında size haber vereceğiz.';
    input.value = '';
    setTimeout(() => { msg.textContent = ''; }, 5000);
  }
</script>

</body>
</html>
